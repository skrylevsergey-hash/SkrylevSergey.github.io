<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Электромонтаж PRO Adaptive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* CSS Variables linked to Telegram Theme */
        :root {
            --bg-color: var(--tg-theme-bg-color, #f4f4f5);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #18181b);
            --hint-color: var(--tg-theme-hint-color, #71717a);
            --accent-color: #f97316; /* Orange */
            --card-border: rgba(0, 0, 0, 0.05);
        }

        /* Dark mode overrides if not in Telegram environment */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #09090b;
                --secondary-bg: #18181b;
                --text-color: #f4f4f5;
                --card-border: rgba(255, 255, 255, 0.1);
            }
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            transition: background-color 0.3s, color 0.3s;
            -webkit-font-smoothing: antialiased;
        }

        .card {
            background-color: var(--secondary-bg);
            border: 1px solid var(--card-border);
        }

        .text-hint { color: var(--hint-color); }
        .text-main { color: var(--text-color); }
        .text-orange { color: var(--accent-color); }

        .tab-btn {
            font-weight: 800;
            font-size: 11px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--hint-color);
            transition: all 0.2s ease;
        }
        .tab-active {
            color: var(--accent-color);
            border-bottom: 2px solid var(--accent-color);
        }

        /* Range Slider Styling */
        input[type="range"] {
            -webkit-appearance: none;
            background: #e4e4e7;
            height: 6px;
            border-radius: 10px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            background: var(--accent-color);
            border: 3px solid var(--secondary-bg);
            border-radius: 50%;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            cursor: pointer;
        }

        .count-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background-color: var(--bg-color);
            color: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.2rem;
        }

        .manual-input {
            width: 50px;
            background: transparent;
            border: none;
            text-align: center;
            font-weight: 900;
            color: var(--accent-color);
            font-size: 1.1rem;
            outline: none;
        }

        .hidden-section { display: none; }
    </style>
</head>
<body class="pb-40">

    <!-- Header Navigation -->
    <nav class="sticky top-0 z-50 flex border-b backdrop-blur-lg bg-opacity-80" style="background-color: var(--secondary-bg); border-color: var(--card-border);">
        <button onclick="switchTab('main')" id="tab-main" class="tab-btn flex-1 py-4 tab-active">Монтаж</button>
        <button onclick="switchTab('shield')" id="tab-shield" class="tab-btn flex-1 py-4">Щит</button>
        <button onclick="switchTab('export')" id="tab-export" class="tab-btn flex-1 py-4">Данные</button>
    </nav>

    <main class="max-w-md mx-auto p-4 space-y-6">
        
        <!-- Base Settings Section -->
        <section id="sec-main">
            <div class="card p-6 rounded-3xl shadow-sm">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <span class="text-[10px] font-black uppercase tracking-widest text-hint">Площадь объекта</span>
                        <div class="text-3xl font-black text-orange"><span id="uiArea">0</span> <span class="text-sm opacity-60">м²</span></div>
                    </div>
                    <div class="text-right">
                        <span class="text-[10px] font-black uppercase tracking-widest text-hint">Тариф ₽/м²</span>
                        <input type="number" id="basePrice" inputmode="numeric" oninput="updateBase()" class="w-24 text-right font-black text-xl bg-transparent border-b-2 border-orange-200 outline-none focus:border-orange-500 text-orange">
                    </div>
                </div>
                
                <input type="range" id="areaSlider" min="0" max="250" step="1" oninput="updateBase()" class="w-full mb-6">

                <div class="pt-4 border-t flex justify-between items-center" style="border-color: var(--card-border);">
                    <div class="flex items-center gap-3">
                        <input type="checkbox" id="useK" onchange="updateBase()" class="w-5 h-5 accent-orange-500">
                        <span class="text-[10px] font-black uppercase text-hint">Коэффициент сложности</span>
                    </div>
                    <input type="number" id="valK" step="0.1" oninput="updateBase()" class="w-14 text-right font-black text-lg bg-transparent text-orange outline-none">
                </div>
            </div>

            <div class="mt-8 space-y-4">
                <div class="flex justify-between items-center px-2">
                    <h3 class="font-black text-[11px] uppercase tracking-wider text-hint">Список работ</h3>
                    <button onclick="openModal('main')" class="text-[10px] font-black bg-orange-500 text-white px-4 py-2 rounded-full shadow-lg shadow-orange-500/20 uppercase">+ Работа</button>
                </div>
                <div id="list-main" class="space-y-3"></div>
            </div>
        </section>

        <!-- Shield Section -->
        <section id="sec-shield" class="hidden-section">
            <div class="flex justify-between items-center px-2 mb-4">
                <h3 class="font-black text-[11px] uppercase tracking-wider text-hint">Модульное оборудование</h3>
                <button onclick="openModal('shield')" class="text-[10px] font-black bg-orange-500 text-white px-4 py-2 rounded-full uppercase">+ Модуль</button>
            </div>
            <div id="list-shield" class="space-y-3"></div>
        </section>

        <!-- Data Section -->
        <section id="sec-export" class="hidden-section">
            <div class="grid gap-4">
                <div class="card p-6 rounded-3xl text-center">
                    <h4 class="font-black uppercase text-xs text-orange mb-4">Отчетность</h4>
                    <button onclick="copyToTg()" class="w-full py-4 bg-orange-500 text-white rounded-2xl font-bold mb-3 shadow-lg shadow-orange-500/20">💬 Копировать для Telegram</button>
                </div>
                <div class="card p-6 rounded-3xl">
                    <h4 class="font-black uppercase text-xs text-hint mb-4 text-center">Управление файлами</h4>
                    <div class="flex gap-2">
                        <button onclick="exportData()" class="flex-1 py-3 bg-zinc-100 dark:bg-zinc-800 rounded-xl font-bold text-xs">💾 Сохранить</button>
                        <label class="flex-1 py-3 bg-zinc-100 dark:bg-zinc-800 rounded-xl font-bold text-xs text-center cursor-pointer">
                            📂 Загрузить
                            <input type="file" accept=".json" onchange="importData(event)" class="hidden">
                        </label>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Fixed Bottom Summary -->
    <div class="fixed bottom-0 left-0 right-0 p-6 z-40 border-t backdrop-blur-xl" style="background-color: rgba(var(--secondary-bg), 0.9); border-color: var(--card-border);">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <span class="text-[10px] font-black text-hint uppercase tracking-tighter">Предварительная смета</span>
                <div id="totalSum" class="text-4xl font-black text-orange tracking-tighter">0 ₽</div>
            </div>
            <button onclick="toggleEdit()" id="editBtn" class="w-14 h-14 rounded-2xl bg-zinc-100 dark:bg-zinc-800 flex items-center justify-center text-xl shadow-inner">⚙️</button>
        </div>
    </div>

    <!-- Modal Dialog -->
    <div id="modal" class="fixed inset-0 bg-black/70 hidden items-center justify-center p-6 z-[100] backdrop-blur-md">
        <div class="card w-full max-w-xs rounded-[2.5rem] p-8">
            <h3 class="text-xl font-black mb-6 uppercase text-orange">Новая запись</h3>
            <div class="space-y-4">
                <input type="text" id="mName" placeholder="Название" class="w-full p-4 rounded-xl bg-zinc-100 dark:bg-zinc-800 border-none outline-none font-bold text-main">
                <input type="number" id="mPrice" placeholder="Цена за ед." class="w-full p-4 rounded-xl bg-zinc-100 dark:bg-zinc-800 border-none outline-none font-bold text-main">
            </div>
            <div class="flex gap-3 mt-8">
                <button onclick="closeModal()" class="flex-1 py-4 font-black text-[10px] uppercase text-hint">Отмена</button>
                <button onclick="confirmAdd()" class="flex-1 py-4 bg-orange-500 text-white rounded-2xl font-black text-[10px] uppercase">ОК</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); }

        let state = JSON.parse(localStorage.getItem('electro_v2')) || {
            area: 40, basePrice: 1200, k: 1.2, useK: false,
            main: [{id:1, name:'Точка (подрозетник)', price:450, count:0}],
            shield: [{id:2, name:'Автомат 1п', price:500, count:0}]
        };

        let isEdit = false;
        let activeTarget = 'main';

        function init() {
            document.getElementById('areaSlider').value = state.area;
            document.getElementById('basePrice').value = state.basePrice;
            document.getElementById('valK').value = state.k;
            document.getElementById('useK').checked = state.useK;
            updateBase();
            render();
        }

        function updateBase() {
            state.area = parseInt(document.getElementById('areaSlider').value) || 0;
            state.basePrice = parseInt(document.getElementById('basePrice').value) || 0;
            state.k = parseFloat(document.getElementById('valK').value) || 1.0;
            state.useK = document.getElementById('useK').checked;
            document.getElementById('uiArea').innerText = state.area;
            calc();
        }

        function calc() {
            const sumItems = arr => arr.reduce((s, i) => s + (i.price * (i.count || 0)), 0);
            let total = (state.area * state.basePrice) + sumItems(state.main) + sumItems(state.shield);
            if (state.useK) total *= state.k;
            document.getElementById('totalSum').innerText = `${Math.round(total).toLocaleString()} ₽`;
            localStorage.setItem('electro_v2', JSON.stringify(state));
        }

        function render() {
            const draw = (type) => {
                const box = document.getElementById(`list-${type}`);
                box.innerHTML = state[type].map(item => `
                    <div class="card p-4 rounded-2xl flex items-center justify-between">
                        <div class="flex-1 pr-4">
                            ${isEdit ? 
                                `<input type="text" oninput="editItem('${type}',${item.id},'name',this.value)" value="${item.name}" class="w-full bg-transparent font-bold text-sm outline-none border-b border-orange-500/20 mb-1 text-main">` :
                                `<div class="font-bold text-sm leading-tight text-main">${item.name}</div>`
                            }
                            <div class="flex items-center gap-2 mt-1">
                                ${isEdit ? 
                                    `<input type="number" oninput="editItem('${type}',${item.id},'price',this.value)" value="${item.price}" class="w-16 bg-transparent text-[10px] font-bold text-orange outline-none">` :
                                    `<span class="text-[10px] font-bold text-orange">${item.price} ₽/ед.</span>`
                                }
                                ${isEdit ? `<button onclick="removeItem('${type}',${item.id})" class="text-[9px] text-red-500 font-black uppercase">Удалить</button>` : ''}
                            </div>
                        </div>
                        <div class="flex items-center gap-1 bg-zinc-50 dark:bg-zinc-800/50 p-1.5 rounded-xl border border-black/5 dark:border-white/5">
                            <button onclick="updateCount('${type}',${item.id},-1)" class="count-btn">−</button>
                            <input type="number" value="${item.count}" oninput="manualCount('${type}',${item.id},this.value)" class="manual-input">
                            <button onclick="updateCount('${type}',${item.id},1)" class="count-btn">+</button>
                        </div>
                    </div>
                `).join('');
            };
            draw('main'); draw('shield');
        }

        function updateCount(type, id, d) {
            const i = state[type].find(x => x.id === id);
            i.count = Math.max(0, (i.count || 0) + d);
            tg?.HapticFeedback?.impactOccurred('light');
            calc(); render();
        }

        function manualCount(type, id, v) {
            state[type].find(x => x.id === id).count = parseInt(v) || 0;
            calc();
        }

        function editItem(type, id, f, v) {
            const i = state[type].find(x => x.id === id);
            i[f] = f === 'price' ? parseInt(v) || 0 : v;
            calc();
        }

        function removeItem(type, id) {
            state[type] = state[type].filter(x => x.id !== id);
            render(); calc();
        }

        function toggleEdit() {
            isEdit = !isEdit;
            const b = document.getElementById('editBtn');
            b.classList.toggle('bg-orange-500', isEdit);
            b.classList.toggle('text-white', isEdit);
            b.innerText = isEdit ? '✅' : '⚙️';
            render();
        }

        function switchTab(t) {
            ['main','shield','export'].forEach(s => {
                document.getElementById(`sec-${s}`).classList.toggle('hidden-section', s !== t);
                document.getElementById(`tab-${s}`).classList.toggle('tab-active', s === t);
            });
        }

        function openModal(t) { activeTarget = t; document.getElementById('modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function confirmAdd() {
            const n = document.getElementById('mName').value;
            const p = parseInt(document.getElementById('mPrice').value);
            if (n && p) {
                state[activeTarget].push({id:Date.now(), name:n, price:p, count:0});
                closeModal(); render();
            }
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(state)], {type:'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'electro_backup.json';
            a.click();
        }

        function importData(e) {
            const reader = new FileReader();
            reader.onload = (f) => {
                state = JSON.parse(f.target.result);
                init();
            };
            reader.readAsText(e.target.files[0]);
        }

        function copyToTg() {
            const items = [...state.main, ...state.shield].filter(x => x.count > 0);
            let msg = `🛠 СМЕТА ОБЪЕКТА\n------------------\n`;
            msg += `🏠 Площадь: ${state.area}м² (${state.basePrice}₽/м²)\n`;
            items.forEach(i => msg += `• ${i.name}: ${i.count} × ${i.price}₽\n`);
            if (state.useK) msg += `⚠️ Коэф. сложности: ×${state.k}\n`;
            msg += `------------------\n💰 ИТОГО: ${document.getElementById('totalSum').innerText}`;
            
            const el = document.createElement('textarea');
            el.value = msg; document.body.appendChild(el);
            el.select(); document.execCommand('copy');
            document.body.removeChild(el);
            tg?.showAlert('Смета скопирована в буфер обмена!');
        }

        init();
    </script>
</body>
</html>
